<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Aqlli Retsept</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg-main: #0D0D0D;
    --bg-hero: #150800;
    --bg-food: #1C0C00;
    --bg-card: #141414;
    --bg-card2: #0A1400;
    --accent: #FF6B35;
    --border: #1E1E1E;
    --text-primary: #FFFFFF;
    --text-secondary: #666666;
    --text-muted: #444444;
  }
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    max-width: 390px;
    margin: 0 auto;
    -webkit-overflow-scrolling: touch;
  }
  .hidden { display: none !important; }

  /* ── HERO ── */
  .hero { background: var(--bg-hero); padding: 16px; }
  .hero-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .logo {
    width: 48px; height: 48px; border-radius: 14px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
  }
  .hero-name { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.2; }
  .hero-tag { font-size: 11px; color: var(--accent); }

  .food-block { background: var(--bg-food); border-radius: 16px; overflow: hidden; }
  .food-img-area {
    position: relative; width: 100%; height: 140px;
    background: #220E00;
    display: flex; align-items: center; justify-content: center;
  }
  .food-img-area img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .food-emoji { font-size: 64px; }
  .food-overlay {
    position: absolute; left: 0; right: 0; bottom: 0; height: 60px;
    background: linear-gradient(transparent, #1C0C00);
  }
  .food-details { padding: 12px 14px 14px; }
  .food-name { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .food-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; }
  .badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
  .badge.time { background: #1A0800; color: #FF6B35; }
  .badge.diff { background: #001A08; color: #4ADE80; }
  .badge.cuisine { background: #00081A; color: #60A5FA; }

  /* ── TABS ── */
  .tabs { display: flex; background: #080808; border-bottom: 0.5px solid #1A1A1A; position: relative; }
  .tab {
    flex: 1; text-align: center; padding: 13px 8px;
    font-size: 13px; font-weight: 500; color: var(--text-muted);
    background: none; border: none; cursor: pointer; transition: color .2s;
  }
  .tab.on { color: var(--accent); }
  .ind {
    position: absolute; bottom: 0; height: 2px; width: 33.33%; left: 0;
    background: var(--accent); border-radius: 2px;
    transition: left .3s cubic-bezier(.4,0,.2,1);
  }

  /* ── BODY ── */
  .body { padding: 16px; }
  .tab-content { display: none; }
  .tab-content.on { display: block; animation: fade .2s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .sec-title {
    font-size: 11px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: .8px; margin-bottom: 12px;
  }

  /* Masalliqlar */
  .ingr-list { display: flex; flex-direction: column; gap: 8px; }
  .ingr-row {
    background: var(--bg-card); border-radius: 12px; padding: 12px 14px;
    display: flex; justify-content: space-between; align-items: center;
    border: 0.5px solid var(--border);
  }
  .ingr-left { display: flex; align-items: center; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ingr-name { font-size: 13px; color: #eee; }
  .ingr-qty { font-size: 13px; color: #555; }

  .nutr { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 16px; }
  .nutr-card { background: var(--bg-card); border-radius: 10px; padding: 12px 4px; text-align: center; }
  .nutr-val { font-size: 15px; font-weight: 700; }
  .nutr-lab { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

  /* Tayyorlash */
  .step { display: flex; gap: 12px; padding: 14px 0; border-bottom: 0.5px solid #141414; }
  .step.last { border-bottom: none; }
  .step-left { display: flex; flex-direction: column; align-items: center; }
  .step-num {
    width: 28px; height: 28px; border-radius: 9px; flex-shrink: 0;
    background: var(--accent); color: #fff; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .step-line { width: 1px; flex: 1; background: var(--border); margin-top: 6px; }
  .step-right { flex: 1; padding-bottom: 2px; }
  .step-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 5px; }
  .step-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
  .step-tip {
    background: #1A0800; border-left: 2px solid var(--accent); border-radius: 8px;
    padding: 6px 10px; font-size: 12px; color: var(--accent); line-height: 1.45;
    margin-top: 8px;
  }
  .step-time { font-size: 11px; color: #60A5FA; margin-top: 8px; }

  /* Maslahatlar */
  .tip {
    background: var(--bg-card2); border-radius: 12px; padding: 12px 14px;
    display: flex; gap: 10px; border: 0.5px solid #142000; margin-bottom: 8px;
  }
  .tip-ico { font-size: 18px; flex-shrink: 0; }
  .tip-txt { font-size: 13px; color: #888; line-height: 1.5; }

  /* ── BOTTOM ── */
  .bottom { padding: 12px 16px 20px; background: var(--bg-main); border-top: 0.5px solid #141414; }
  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; min-height: 48px; border-radius: 14px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s;
  }
  .btn:active { opacity: .8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: #1A1A1A; color: #888; border: 0.5px solid #242424; }

  /* Loader / Error */
  .center { min-height: 80vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; color: var(--text-secondary); }
  .spinner { width: 38px; height: 38px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading" class="center">
  <div class="spinner"></div>
  <div>Retsept tayyorlanyapti...</div>
</div>

<div id="error" class="center hidden">
  <div style="font-size:42px">😔</div>
  <div>Retseptni yuklab bo'lmadi.</div>
</div>

<div id="app" class="hidden">
  <!-- HERO -->
  <div class="hero">
    <div class="hero-row">
      <div class="logo">🍳</div>
      <div>
        <div class="hero-name">Aqlli Retsept</div>
        <div class="hero-tag">@AqllRetseptBot</div>
      </div>
    </div>
    <div class="food-block">
      <div class="food-img-area">
        <img id="foodImg" class="hidden" alt="">
        <div id="foodEmoji" class="food-emoji">🍽</div>
        <div class="food-overlay"></div>
      </div>
      <div class="food-details">
        <div class="food-name" id="foodName"></div>
        <div class="food-desc" id="foodDesc"></div>
        <div class="badges">
          <span class="badge time">⏱ <span id="bTime"></span></span>
          <span class="badge diff" id="bDiff"></span>
          <span class="badge cuisine" id="bCuisine"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab on" onclick="switchTab(0,this)">Masalliqlar</button>
    <button class="tab" onclick="switchTab(1,this)">Tayyorlash</button>
    <button class="tab" onclick="switchTab(2,this)">Maslahatlar</button>
    <div class="ind" id="ind"></div>
  </div>

  <!-- BODY -->
  <div class="body">
    <div class="tab-content on" id="tab0">
      <div class="sec-title">Kerakli masalliqlar</div>
      <div class="ingr-list" id="ingrList"></div>
      <div class="nutr" id="nutr"></div>
    </div>
    <div class="tab-content" id="tab1">
      <div class="sec-title">Bosqichma-bosqich</div>
      <div id="stepsList"></div>
    </div>
    <div class="tab-content" id="tab2">
      <div class="sec-title">Oshpaz maslahatlari</div>
      <div id="tipsList"></div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom">
    <div class="btn-row">
      <button class="btn btn-primary" id="saveBtn">❤️ Saqlash</button>
      <button class="btn btn-secondary" id="restartBtn">🔄 Boshqa taom</button>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const DOT_COLORS = ["#FF6B35", "#F59E0B", "#A78BFA", "#34D399", "#60A5FA", "#F472B6"];
  const TIP_ICONS = ["🔥", "🔪", "🧂", "🌶️", "🍽️", "✨", "👨‍🍳"];
  let currentRecipe = null;

  // Demo retsept (?demo=1 — brauzerda backend'siz ko'rish uchun)
  const DEMO = {
    taom: "Mini pitsa non ustida", oshxona: "Universal", vaqt_daqiqa: 15,
    qiyinlik: "Oson", porsiya: "2 kishi uchun", rasm_url: null,
    masalliqlar: [
      {nom:"Non", miqdor:"2 bo'lak"}, {nom:"Pomidor", miqdor:"1 ta"},
      {nom:"Pishloq", miqdor:"100 g"}, {nom:"Kolbasa", miqdor:"50 g"},
      {nom:"Ketchup", miqdor:"2 osh q."}, {nom:"Ko'kat", miqdor:"ozgina"}
    ],
    bosqichlar: [
      {raqam:1, sarlavha:"Nonni tayyorlang", tavsif:"Nonni ikkiga bo'lib, ustiga ketchup suring.", maslahat:"Non quruq bo'lsa, biroz suv sepib yumshating.", vaqt_daqiqa:3},
      {raqam:2, sarlavha:"Tarkibni joylang", tavsif:"Pomidor, kolbasa va pishloqni non ustiga teng joylang.", maslahat:"Pishloqni eng ustiga soling — yaxshi eriydi.", vaqt_daqiqa:4},
      {raqam:3, sarlavha:"Pishiring", tavsif:"180°C duxovkada 8 daqiqa, pishloq erib oltin rang olguncha pishiring.", maslahat:"", vaqt_daqiqa:8}
    ],
    oshpaz_maslahatlari: [
      "Issiq holda iste'mol qiling — pishloq cho'ziladi.",
      "Achchiqroq bo'lsin desangiz, qalampir qo'shing."
    ],
    kaloriya: 380, oqsil: "18g", uglerod: "32g", yog_miqdori: "16g"
  };

  function switchTab(index, el) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.getElementById('tab' + index).classList.add('on');
    el.classList.add('on');
    document.getElementById('ind').style.left = (index * 33.33) + '%';
  }

  function render(r) {
    currentRecipe = r;

    document.getElementById('foodName').textContent = r.taom || "Taom";
    document.getElementById('foodDesc').textContent =
      `${r.oshxona || ""} oshxonasi · ${r.porsiya || ""}`;
    document.getElementById('bTime').textContent = (r.vaqt_daqiqa || "?") + " daqiqa";
    document.getElementById('bDiff').textContent = r.qiyinlik || "—";
    document.getElementById('bCuisine').textContent = r.oshxona || "—";

    // Rasm yoki emoji fallback
    if (r.rasm_url) {
      const img = document.getElementById('foodImg');
      img.src = r.rasm_url;
      img.onload = () => {
        img.classList.remove('hidden');
        document.getElementById('foodEmoji').classList.add('hidden');
      };
      img.onerror = () => { img.classList.add('hidden'); };
    }

    // Masalliqlar
    const il = document.getElementById('ingrList');
    il.innerHTML = "";
    (r.masalliqlar || []).forEach((m, i) => {
      const row = document.createElement('div');
      row.className = 'ingr-row';
      row.innerHTML =
        `<div class="ingr-left"><span class="dot"></span><span class="ingr-name"></span></div>` +
        `<span class="ingr-qty"></span>`;
      row.querySelector('.dot').style.background = DOT_COLORS[i % DOT_COLORS.length];
      row.querySelector('.ingr-name').textContent = m.nom || "";
      row.querySelector('.ingr-qty').textContent = m.miqdor || "";
      il.appendChild(row);
    });

    // Ozuqa qiymati
    const nuts = [
      {val: r.kaloriya, lab: "Kaloriya", c: "#FF6B35"},
      {val: r.oqsil, lab: "Oqsil", c: "#60A5FA"},
      {val: r.uglerod, lab: "Uglevod", c: "#F59E0B"},
      {val: r.yog_miqdori, lab: "Yog'", c: "#F472B6"}
    ];
    const nu = document.getElementById('nutr');
    nu.innerHTML = "";
    nuts.forEach(n => {
      const c = document.createElement('div');
      c.className = 'nutr-card';
      c.innerHTML = `<div class="nutr-val"></div><div class="nutr-lab"></div>`;
      const v = c.querySelector('.nutr-val');
      v.textContent = (n.val ?? "—"); v.style.color = n.c;
      c.querySelector('.nutr-lab').textContent = n.lab;
      nu.appendChild(c);
    });

    // Bosqichlar
    const sl = document.getElementById('stepsList');
    sl.innerHTML = "";
    const steps = r.bosqichlar || [];
    steps.forEach((b, i) => {
      const last = i === steps.length - 1;
      const s = document.createElement('div');
      s.className = 'step' + (last ? ' last' : '');
      let html = `<div class="step-left"><div class="step-num">${b.raqam || (i+1)}</div>`;
      if (!last) html += `<div class="step-line"></div>`;
      html += `</div><div class="step-right"><div class="step-title"></div><div class="step-desc"></div>`;
      if (b.maslahat) html += `<div class="step-tip">💡 <span class="tiptext"></span></div>`;
      if (b.vaqt_daqiqa) html += `<div class="step-time">⏱ ${b.vaqt_daqiqa} daqiqa</div>`;
      html += `</div>`;
      s.innerHTML = html;
      s.querySelector('.step-title').textContent = b.sarlavha || "";
      s.querySelector('.step-desc').textContent = b.tavsif || "";
      if (b.maslahat) s.querySelector('.tiptext').textContent = b.maslahat;
      sl.appendChild(s);
    });

    // Maslahatlar
    const tl = document.getElementById('tipsList');
    tl.innerHTML = "";
    (r.oshpaz_maslahatlari || []).forEach((t, i) => {
      const d = document.createElement('div');
      d.className = 'tip';
      d.innerHTML = `<span class="tip-ico">${TIP_ICONS[i % TIP_ICONS.length]}</span><span class="tip-txt"></span>`;
      d.querySelector('.tip-txt').textContent = t;
      tl.appendChild(d);
    });

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
  }

  function showError() {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
  }

  // Pastki tugmalar — Telegram'ga ma'lumot yuborish
  document.getElementById('saveBtn').addEventListener('click', () => {
    if (tg) tg.sendData(JSON.stringify({ action: 'save', taom: currentRecipe ? currentRecipe.taom : '' }));
  });
  document.getElementById('restartBtn').addEventListener('click', () => {
    if (tg) tg.sendData(JSON.stringify({ action: 'restart' }));
  });

  // Havoladagi siqilgan (gzip+base64) retsept ma'lumotini ochadi
  async function gunzipB64(b64) {
    const norm = b64.replace(/-/g, "+").replace(/_/g, "/");
    const bin = atob(norm);
    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
    const buf = await new Response(stream).arrayBuffer();
    return JSON.parse(new TextDecoder("utf-8").decode(buf));
  }

  // Ma'lumotni yuklash: ?d= (asosiy), ?id= (zaxira), ?demo=1 (namuna)
  const params = new URLSearchParams(location.search);
  if (params.get("demo")) {
    render(DEMO);
  } else if (params.get("d")) {
    gunzipB64(params.get("d")).then(render).catch(showError);
  } else {
    const id = params.get("id");
    if (!id) { showError(); }
    else {
      fetch(`/api/recipe/${encodeURIComponent(id)}`)
        .then(res => { if (!res.ok) throw new Error(); return res.json(); })
        .then(render)
        .catch(showError);
    }
  }
</script>
</body>
</html>
